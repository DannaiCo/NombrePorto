<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Día de la madre - iCo Medios</title>

    <meta http-equiv="refresh" content="180" />

    <!-- FUENTE -->
    <link rel="stylesheet" href="https://use.typekit.net/vsp7vcb.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
      }

      .contenedor {
        position: relative;

        width: 2120px;
        height: 576px;

        overflow: hidden;

        transform-origin: top left;
      }

      /* VIDEO */
      #fondoVideo {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
      }

      /* CONTENEDOR TEXTO */
      /* CONTENEDOR GENERAL */
      #nombres {
        position: absolute;
        inset: 0;
        z-index: 5;
      }

      /* NOMBRE MAMÁ */
      .nombre {
        position: absolute;

        top: 500px;
        left: 0px;

        width: 200px;

        text-align: center;

        color: #0000ec;

        font-size: 89px;

        font-family: "filson-soft", sans-serif;

        font-weight: 700;

        font-style: normal;

        opacity: 0;

        transition: opacity 0.8s ease;
      }

      /* DICHO */
      .dicho {
        position: absolute;

        top: 211px;
        left: 175px;

        width: 1100px;

        text-align: center;

        color: #cd2530;

        font-size: 90px;

        line-height: 1.2;

        font-family: "filson-soft", sans-serif;

        font-weight: 700;

        font-style: normal;

        opacity: 0;

        transition: opacity 0.8s ease;
      }
      .mostrar {
        opacity: 1;
      }
    </style>
  </head>

  <body>
    <div class="contenedor">
      <!-- VIDEO -->
      <video autoplay muted loop playsinline id="fondoVideo">
        <source src="fondo.mp4" type="video/mp4" />
      </video>

      <!-- TEXTOS -->
      <div id="nombres">
        <div class="dicho"></div>
      </div>
    </div>
    <script>
      function escalarPantalla() {
        const escalaX = window.innerWidth / 2120;
        const escalaY = window.innerHeight / 576;

        const escala = Math.min(escalaX, escalaY);

        document.querySelector(".contenedor").style.transform = `scale(${escala})`;
      }

      window.addEventListener("resize", escalarPantalla);
      window.addEventListener("load", escalarPantalla);

      escalarPantalla();

      const url =
        "https://script.google.com/macros/s/AKfycbzwPsdGLy5kUFCS6T-J5LaXAsN8tPmV_h23cY9wNMb5-aJUj-fnhpsVya1oSLXGgjlelg/exec";

      const elDicho = document.querySelector(".dicho");

      fetch(url)
        .then((response) => response.json())
        .then((data) => {
          console.log("Datos recibidos:", data);

          if (!data || data.length === 0) {
            elDicho.textContent = "No hay frases aprobadas";
            elDicho.classList.add("mostrar");
            return;
          }

          let index = 0;

          function mostrarMensaje() {
            const item = data[Math.floor(Math.random() * data.length)];

            console.log("Frase aleatoria:", item);

            elDicho.classList.remove("mostrar");

            setTimeout(() => {
              elDicho.textContent = item || "";
              elDicho.classList.add("mostrar");
            }, 300);
          }

          mostrarMensaje();

          setInterval(mostrarMensaje, 5000);
        })
        .catch((error) => {
          console.error("Error:", error);

          elDicho.textContent = "Error cargando frases";
          elDicho.classList.add("mostrar");
        });
    </script>
  </body>
</html>
